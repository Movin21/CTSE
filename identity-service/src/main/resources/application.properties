# ─── Server ────────────────────────────────────────────────────────────────
server.port=8081

# ─── Database ──────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/identity_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ───────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ───────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ctse-se4010-ultra-secure-jwt-secret-key-2024!}
jwt.expiration-ms=86400000

# ─── Actuator ──────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Identity Service
info.app.version=1.0.0
info.app.team=SE4010 CTSE

# ─── Logging ───────────────────────────────────────────────────────────────
logging.level.com.ctse=DEBUG
logging.level.org.springframework.security=WARN
