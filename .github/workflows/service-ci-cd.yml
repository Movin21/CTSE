name: Reusable CI/CD

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      language:
        required: true
        type: string
      port:
        required: true
        type: number
      ingress:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Java Steps
      - uses: actions/setup-java@v4
        if: inputs.language == 'java'
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - working-directory: ./${{ inputs.service }}
        if: inputs.language == 'java'
        run: mvn clean test
      - uses: snyk/actions/maven@master
        if: inputs.language == 'java'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --all-projects
        continue-on-error: true

      # Node Steps
      - uses: actions/setup-node@v4
        if: inputs.language == 'node'
        with:
          node-version: "20"
      - working-directory: ./${{ inputs.service }}
        if: inputs.language == 'node'
        run: npm ci || npm install
      - working-directory: ./${{ inputs.service }}
        if: inputs.language == 'node'
        run: npm run test --if-present
        env:
          CI: true
      - uses: snyk/actions/node@master
        if: inputs.language == 'node'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
        continue-on-error: true

  docker-build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.service }}
          tags: type=sha,format=long
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.service }}
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.service }}:sha-${{ github.sha }}

  deploy-azure:
    needs: docker-build-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.service }}
    steps:
      - name: Log in to Azure
        run: |
          az login --service-principal \
            -u ${{ secrets.ARM_CLIENT_ID }} \
            -p ${{ secrets.ARM_CLIENT_SECRET }} \
            --tenant ${{ secrets.ARM_TENANT_ID }}
          az account set --subscription ${{ secrets.ARM_SUBSCRIPTION_ID }}
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.service }}:sha-${{ github.sha }}
          containerAppName: ${{ inputs.service }}
          resourceGroup: "ctse-microservices-rg"
          containerAppEnvironment: "ctse-env"
          targetPort: ${{ inputs.port }}
          ingress: ${{ inputs.ingress }}
          registryUrl: ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          # Using the space-separated or comma-separated format is often more reliable
          environmentVariables: >-
            DATABASE_URL=${{ secrets.DB_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            RABBITMQ_URL=${{ secrets.RABBITMQ_URL }}
            DATABASE_USER=${{ secrets.POSTGRES_USER }}
            DATABASE_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ORDER_SERVICE_URL=http://order-service
            IDENTITY_SERVICE_URL=http://identity-service
            PRODUCT_SERVICE_URL=http://product-service
            NOTIFICATION_SERVICE_URL=http://notification-service
            ADMIN_SERVICE_URL=http://admin-service